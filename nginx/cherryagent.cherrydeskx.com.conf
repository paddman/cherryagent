upstream vtuber_gpu {
    server 203.113.71.134:12393;
    keepalive 16;
}

server {
    server_name cherryagent.cherrydeskx.com;

    client_max_body_size 25m;

    auth_basic "CherryAgent";
    auth_basic_user_file /etc/nginx/.htpasswd-cherryagent;

    # LINE webhook must stay public for platform callbacks.
    location = /channels/line/webhook {
        auth_basic off;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Duplex voice WebSocket
    location = /client-ws {
        proxy_pass http://vtuber_gpu/client-ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Duplex UI assets (Open-LLM-VTuber frontend)
    location ^~ /live/assets/ {
        rewrite ^/live/assets/(.*)$ /assets/$1 break;
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location ^~ /assets/ {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location ^~ /cache/ {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location ^~ /live2d-models/ {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location ^~ /bg/ {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location ^~ /avatars/ {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location ^~ /vendor/ {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location ^~ /vrm-models/ {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location = /asr {
        proxy_pass http://vtuber_gpu/asr;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location = /health {
        proxy_pass http://vtuber_gpu/health;
        proxy_set_header Host $host;
    }

    location ^~ /web-tool {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location ^~ /web_tool {
        proxy_pass http://vtuber_gpu;
        proxy_set_header Host $host;
    }

    location = /live {
        return 302 /live/;
    }

    location ^~ /live/ {
        proxy_pass http://vtuber_gpu/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    ssl_certificate /etc/letsencrypt/live/cherryagent.cherrydeskx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cherryagent.cherrydeskx.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = cherryagent.cherrydeskx.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name cherryagent.cherrydeskx.com;
    return 404;
}
