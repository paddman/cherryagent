name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Capture typecheck diagnostics
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload typecheck diagnostics
        if: steps.typecheck.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
      - name: Fail on typecheck errors
        if: steps.typecheck.outputs.status != '0'
        run: exit 1
      - run: npm run build
