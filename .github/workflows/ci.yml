name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run typecheck and capture log
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infra-typecheck-log
          path: typecheck.log
      - name: Fail if typecheck failed
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - run: npm run build
