name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run typecheck and capture log
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck.log
          code=${PIPESTATUS[0]}
          echo "TYPECHECK_EXIT=$code" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: agentic-typecheck-log
          path: typecheck.log
      - name: Fail when typecheck failed
        run: exit "$TYPECHECK_EXIT"
      - run: npm run build
