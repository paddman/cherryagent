name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run typecheck with diagnostics
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee engineer-typecheck.log
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engineer-typecheck-log
          path: engineer-typecheck.log
      - run: npm run build
